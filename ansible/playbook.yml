- hosts: compute_nodes
  become: true
  # Variables are loaded from group_vars/all.yml or host_vars/<host>.yml
  # (both gitignored). Copy ansible/vars.example.yml as a starting point.
  # Do NOT add vars_files pointing at vars.example.yml in production –
  # that file contains placeholder values only.

  tasks:
    - name: Ensure apt cache is up to date (Debian/Ubuntu)
      apt:
        update_cache: yes
      when: ansible_os_family == 'Debian'

    - name: Install prerequisite packages
      package:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
      when: ansible_os_family == 'Debian'

    - name: Add Docker GPG key (Debian/Ubuntu)
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: ansible_os_family == 'Debian'

    - name: Add Docker repository (Debian/Ubuntu)
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present
      when: ansible_os_family == 'Debian'

    - name: Install Docker CE
      package:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
      when: ansible_os_family == 'Debian'

    - name: Ensure docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: true

    - name: Ensure compute-service user is present
      user:
        name: "{{ caas_user }}"
        state: present
        groups: docker
        append: true

    - name: Ensure data mount directory exists
      file:
        path: "{{ caas_data_mount }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure mount present in /etc/fstab
      mount:
        path: "{{ caas_data_mount }}"
        src: "{{ caas_data_source }}"
        fstype: "{{ caas_data_fstype }}"
        opts: "{{ caas_data_opts }}"
        state: mounted

    - name: Notify about successful provisioning
      debug:
        msg: "Compute-service provisioning tasks completed. Ensure any machine-specific tuning is handled in host_vars or group_vars."

    # ── GPU support (only runs when caas_gpu_enabled: true) ──────────────────

    - name: Install NVIDIA driver (Ubuntu)
      apt:
        name: "nvidia-driver-{{ caas_nvidia_driver_branch }}"
        state: present
        update_cache: yes
      when:
        - caas_gpu_enabled | default(false)
        - ansible_os_family == 'Debian'

    - name: Add NVIDIA container toolkit GPG key
      apt_key:
        url: https://nvidia.github.io/libnvidia-container/gpgkey
        state: present
      when:
        - caas_gpu_enabled | default(false)
        - ansible_os_family == 'Debian'

    - name: Add NVIDIA container toolkit repository
      apt_repository:
        repo: >-
          deb https://nvidia.github.io/libnvidia-container/stable/deb/{{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'armv7l': 'armhf'}[ansible_architecture] | default(ansible_architecture) }} /
        state: present
        filename: nvidia-container-toolkit
      when:
        - caas_gpu_enabled | default(false)
        - ansible_os_family == 'Debian'

    - name: Install nvidia-container-toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: yes
      when:
        - caas_gpu_enabled | default(false)
        - ansible_os_family == 'Debian'

    - name: Check whether Docker is already configured to use NVIDIA runtime
      command: grep -q '"default-runtime"[[:space:]]*:[[:space:]]*"nvidia"' /etc/docker/daemon.json
      register: nvidia_runtime_configured
      changed_when: false
      failed_when: false
      when:
        - caas_gpu_enabled | default(false)
        - ansible_os_family == 'Debian'

    - name: Configure Docker to use NVIDIA runtime
      command: nvidia-ctk runtime configure --runtime=docker
      when:
        - caas_gpu_enabled | default(false)
        - ansible_os_family == 'Debian'
        - nvidia_runtime_configured.rc != 0
      notify: Restart Docker

    - name: Notify GPU provisioning complete
      debug:
        msg: "NVIDIA driver and container toolkit installed. A reboot may be required before GPUs are accessible."
      when: caas_gpu_enabled | default(false)

  handlers:
    - name: Restart Docker
      service:
        name: docker
        state: restarted
