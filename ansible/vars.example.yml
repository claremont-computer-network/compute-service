# Example vars for the compute-service playbook.
# Copy to group_vars/all.yml or host_vars/<host>.yml locally (not committed).

# Path where the external storage (NAS) should be mounted on the host
caas_data_mount: /mnt/caas-data

# The device or remote export to mount. Can be an NFS path like "nfs.example.com:/export/path"
caas_data_source: "nfs.example.com:/exports/caas"

# Mount options
caas_data_fstype: nfs
caas_data_opts: defaults,_netdev

# User that should be added to the docker group (so the dispatcher can manage Docker)
caas_user: ubuntu

# Set to true on machines that have an NVIDIA GPU and should run GPU workloads.
# When true, the playbook will install the NVIDIA driver and container toolkit.
caas_gpu_enabled: false

# The NVIDIA driver branch to install (e.g. 550, 535).
# Only used when caas_gpu_enabled is true.
caas_nvidia_driver_branch: "550"
