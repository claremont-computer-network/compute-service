<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaaS — Job Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      background: #0d1117;
      color: #e6edf3;
      padding: 2rem;
      font-size: 14px;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #21262d;
      padding-bottom: 1rem;
    }

    header h1 { font-size: 1.1rem; color: #58a6ff; }

    #status {
      font-size: 0.75rem;
      color: #8b949e;
    }

    #status.error { color: #f85149; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      color: #8b949e;
      font-weight: 500;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }

    tbody tr.job-row {
      border-bottom: 1px solid #161b22;
      transition: background 0.1s;
      cursor: pointer;
    }

    tbody tr.job-row:hover  { background: #161b22; }
    tbody tr.job-row:focus  { outline: 2px solid #58a6ff; outline-offset: -2px; background: #161b22; }

    tbody tr.log-row td {
      padding: 0;
      border-bottom: 1px solid #21262d;
    }

    .log-panel {
      background: #010409;
      border-top: 1px solid #21262d;
      padding: 0.75rem 1rem;
      overflow-x: auto;
    }

    .log-panel pre {
      font-size: 0.8rem;
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }

    .log-panel .log-loading { color: #3d444d; font-style: italic; }
    .log-panel .log-error   { color: #f85149; }

    td {
      padding: 0.5rem 0.75rem;
      vertical-align: middle;
      white-space: nowrap;
    }

    .job-id {
      color: #8b949e;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

    .image { color: #79c0ff; }

    .cmd {
      color: #8b949e;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 2em;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-running { background: #1f4a1f; color: #3fb950; }
    .badge-stopped { background: #1c2a3a; color: #58a6ff; }
    .badge-failed  { background: #3d1c1c; color: #f85149; }
    .badge-unknown { background: #21262d; color: #8b949e; }

    .exit-ok   { color: #3fb950; }
    .exit-fail { color: #f85149; }
    .exit-null { color: #3d444d; }

    .resource      { color: #d2a8ff; }
    .resource-null { color: #3d444d; }
    .duration      { color: #8b949e; font-size: 0.8rem; }

    /* Sparkline canvas cells */
    .spark-cell {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .spark-cell canvas { display: block; }
    .spark-label { color: #d2a8ff; min-width: 52px; text-align: right; }
    .spark-label.null { color: #3d444d; }

    /* Action buttons — wired to DELETE /v1/jobs/{id}, disabled when not running */
    .actions button {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.1s, color 0.1s;
    }

    .actions button:not([disabled]):hover {
      border-color: #f85149;
      color: #f85149;
    }

    .actions button[disabled] {
      opacity: 0.25;
      cursor: default;
    }

    #empty {
      text-align: center;
      padding: 3rem;
      color: #3d444d;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ CaaS Job Monitor</h1>
    <span id="status">connecting…</span>
  </header>

  <!-- Tab navigation -->
  <nav id="tabs" style="display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid #21262d;">
    <button class="tab-btn active" data-tab="monitor" style="
      background:none;border:none;border-bottom:2px solid #58a6ff;color:#58a6ff;
      padding:0.5rem 1rem;font-family:inherit;font-size:0.85rem;cursor:pointer;
    ">Monitor</button>
    <button class="tab-btn" data-tab="launch" style="
      background:none;border:none;border-bottom:2px solid transparent;color:#8b949e;
      padding:0.5rem 1rem;font-family:inherit;font-size:0.85rem;cursor:pointer;
    ">Launch</button>
    <button class="tab-btn" data-tab="templates" style="
      background:none;border:none;border-bottom:2px solid transparent;color:#8b949e;
      padding:0.5rem 1rem;font-family:inherit;font-size:0.85rem;cursor:pointer;
    ">Templates</button>
    <button class="tab-btn" data-tab="schedules" style="background:none;border:none;border-bottom:2px solid transparent;color:#8b949e;padding:0.5rem 1rem;font-family:inherit;font-size:0.85rem;cursor:pointer;">Schedules</button>
  </nav>

   <!-- Tabs content wrapper -->
  <div id="tab-content">
    <!-- Templates tab -->
    <div id="panel-templates" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h2 style="margin:0;font-size:1rem;color:#e6ed3f;">Templates</h2>
        <button id="tpl-new-btn" style="background:#238636;color:#fff;border:none;padding:0.4rem 0.8rem;font-family:inherit;font-size:0.85rem;border-radius:4px;cursor:pointer;">
          + New Template
        </button>
      </div>
      <div id="tpl-list" style="display:flex;flex-direction:column;gap:0.5rem;"></div>
      <div id="tpl-edit-panel" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
          <h3 style="margin:0;font-size:1rem;color:#e6ed3f;" id="tpl-edit-title">Edit Template</h3>
          <div style="display:flex;gap:0.5rem;">
            <button id="tpl-delete-btn" style="background:#da3633;color:#fff;border:none;padding:0.4rem 0.8rem;font-family:inherit;font-size:0.85rem;border-radius:4px;cursor:pointer;">Delete</button>
            <button id="tpl-cancel-btn" style="background:#21262d;color:#8b949e;border:1px solid #30363d;padding:0.4rem 0.8rem;font-family:inherit;font-size:0.85rem;border-radius:4px;cursor:pointer;">Cancel</button>
            <button id="tpl-save-btn" style="background:#238636;color:#fff;border:none;padding:0.4rem 0.8rem;font-family:inherit;font-size:0.85rem;border-radius:4px;cursor:pointer;">Save</button>
          </div>
        </div>
        <form id="tpl-form" style="max-width:500px;display:flex;flex-direction:column;gap:0.8rem;">
          <div>
            <label for="tpl-name" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Name</label>
            <input id="tpl-name" type="text" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;" placeholder="My Python Template">
          </div>
          <div>
            <label for="tpl-image" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Image</label>
            <input id="tpl-image" type="text" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;" placeholder="python:3.12-slim">
          </div>
          <div>
            <label for="tpl-cmd" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Command</label>
            <textarea id="tpl-cmd" rows="2" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;" placeholder="python train.py --epochs 10"></textarea>
          </div>
          <div>
            <label for="tpl-env" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Environment Variables</label>
            <textarea id="tpl-env" rows="3" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;" placeholder="EPOCHS=10&#10;LEARNING_RATE=0.001"></textarea>
          </div>
          <div>
            <label for="tpl-volumes" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Volumes</label>
            <textarea id="tpl-volumes" rows="2" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;" placeholder='/mnt/data:/data:ro&#10;/mnt/models:/models'></textarea>
          </div>
        </form>
      </div>
    </div>

    <!-- Monitor tab (existing) -->
    <div id="panel-monitor">
      <table id="job-table">
    <thead>
      <tr>
        <th>Job ID</th>
        <th>Image</th>
        <th>Command</th>
        <th>Status</th>
        <th>Submitted</th>
        <th>Duration</th>
        <th>CPU %</th>
        <th>Memory</th>
        <th>Exit</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="job-body">
      <tr id="empty"><td colspan="10">No jobs yet.</td></tr>
    </tbody>
  </table>
  </div>

  <!-- Launch tab -->
  <div id="panel-launch" style="display:none;">
    <form id="launch-form" style="max-width:640px;">
      <div style="margin-bottom:1rem;">
        <label for="template-select" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">Load Template</label>
        <select id="template-select" style="
          background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
          font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;
        ">
          <option value="">— none —</option>
        </select>
      </div>

      <div style="margin-bottom:1rem;">
        <label for="job-image" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">Image <span style="color:#f85149;">*</span></label>
        <input id="job-image" name="image" type="text" placeholder="python:3.12-slim" style="
          background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
          font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;
        ">
      </div>

      <div style="margin-bottom:1rem;">
        <label for="job-cmd" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">Command</label>
        <textarea id="job-cmd" name="cmd" rows="2" placeholder='python train.py --epochs 10' style="
          background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
          font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;
        "></textarea>
      </div>

      <div style="margin-bottom:1rem;">
        <label for="job-env" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">Environment</label>
        <textarea id="job-env" name="env" rows="2" placeholder='EPOCHS=10&#10;LEARNING_RATE=0.001' style="
          background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
          font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;
        "></textarea>
      </div>

      <div style="margin-bottom:1rem;">
        <label for="staging-select" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">Load Staging Area</label>
        <select id="staging-select" style="
          background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
          font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;
        ">
          <option value="">— none —</option>
        </select>
      </div>

      <div style="margin-bottom:1rem;">
        <label for="job-volumes" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">Volumes</label>
        <textarea id="job-volumes" name="volumes" rows="2" placeholder='/mnt/data:/data:ro&#10;/mnt/results:/outputs' style="
          background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
          font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;
        "></textarea>
        <small style="color:#8b949e;font-size:0.7rem;">One per line: HOST_PATH:CONTAINER_PATH[:MODE]</small>
      </div>

      <div style="display:flex;gap:1rem;margin-bottom:1rem;">
        <div style="flex:1;">
          <label for="job-gpu" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">GPU</label>
          <select id="job-gpu" name="gpu" style="
            background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
            font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;
          ">
            <option value="">None</option>
            <option value="all">All</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
        <div style="flex:1;">
          <label for="job-shm" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">Shared Memory</label>
          <input id="job-shm" name="shm_size" type="text" placeholder="2g" style="
            background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
            font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;
          ">
        </div>
      </div>

      <div style="display:flex;gap:1rem;margin-bottom:1.5rem;">
        <div style="flex:1;">
          <label for="job-ipc" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">IPC Mode</label>
          <input id="job-ipc" name="ipc_mode" type="text" placeholder="host" style="
            background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
            font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;
          ">
        </div>
        <div style="flex:1;">
          <label for="job-detach" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.3rem;">Mode</label>
          <select id="job-detach" name="detach" style="
            background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;
            font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;
          ">
            <option value="1">Detached</option>
            <option value="0">Synchronous</option>
          </select>
        </div>
      </div>

      <button type="submit" id="submit-btn" style="
        background:#238636;border:none;color:#fff;padding:0.5rem 1.2rem;
        border-radius:4px;font-family:inherit;font-size:0.85rem;cursor:pointer;
      ">Submit Job</button>
    </form>

    <div id="launch-result" style="margin-top:1.5rem;display:none;">
      <div id="result-header" style="
        color:#8b949e;font-size:0.8rem;margin-bottom:0.5rem;border-bottom:1px solid #21262d;
        padding-bottom:0.3rem;
      "></div>
      <pre id="result-body" style="
        background:#010409;border:1px solid #21262d;padding:0.75rem 1rem;border-radius:4px;
        color:#8b949e;font-size:0.8rem;white-space:pre-wrap;word-break:break-all;
        max-height:200px;overflow-y:auto;
      "></pre>
     </div>
   </div>

  <!-- Schedules tab -->
  <div id="panel-schedules" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 style="margin:0;font-size:1rem;color:#e6ed3f;">Scheduled Jobs</h2>
      <button id="sch-new-btn" style="background:#238636;color:#fff;border:none;padding:0.4rem 0.8rem;font-family:inherit;font-size:0.85rem;border-radius:4px;cursor:pointer;">+ Schedule Job</button>
    </div>
    <div id="sch-list" style="display:flex;flex-direction:column;gap:0.5rem;"></div>
    <div id="sch-edit-panel" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h3 style="margin:0;font-size:1rem;color:#e6ed3f;" id="sch-edit-title">Schedule Job</h3>
        <div style="display:flex;gap:0.5rem;">
          <button id="sch-cancel-btn" style="background:#da3633;color:#fff;border:none;padding:0.4rem 0.8rem;font-family:inherit;font-size:0.85rem;border-radius:4px;cursor:pointer;">Cancel</button>
          <button id="sch-save-btn" style="background:#238636;color:#fff;border:none;padding:0.4rem 0.8rem;font-family:inherit;font-size:0.85rem;border-radius:4px;cursor:pointer;">Save Schedule</button>
        </div>
      </div>
      <form id="sch-form" style="max-width:500px;display:flex;flex-direction:column;gap:0.8rem;">
        <div><label for="sch-template" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Template</label><select id="sch-template" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;"><option value="">— use form fields —</option></select></div>
        <div><label for="sch-delay" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Delay (seconds)</label><input id="sch-delay" type="number" min="0" value="60" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;"></div>
        <div><label for="sch-image" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Image</label><input id="sch-image" type="text" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;" placeholder="python:3.12-slim"></div>
        <div><label for="sch-cmd" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Command</label><textarea id="sch-cmd" rows="2" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;" placeholder="python train.py --epochs 10"></textarea></div>
        <div><label for="sch-env" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Environment Variables</label><textarea id="sch-env" rows="3" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;" placeholder="EPOCHS=10&#10;LEARNING_RATE=0.001"></textarea></div>
        <div><label for="sch-volumes" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">Volumes</label><textarea id="sch-volumes" rows="2" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;resize:vertical;" placeholder='/mnt/data:/data:ro&#10;/mnt/models:/models'></textarea></div>
        <div><label for="sch-gpu" style="display:block;color:#8b949e;font-size:0.8rem;margin-bottom:0.2rem;">GPU</label><input id="sch-gpu" type="text" style="background:#0d1117;border:1px solid #30363d;color:#e6ed3f;padding:0.4rem 0.6rem;font-family:inherit;font-size:0.85rem;width:100%;border-radius:4px;" placeholder="all"></div>
      </form>
    </div>
  </div>

  </div><!-- /tab-content -->

  <script>
    // ── config ────────────────────────────────────────────────────────────────
    const INTERVAL    = 3000; // poll interval in ms
    const SPARK_W     = 60;   // sparkline canvas width px
    const SPARK_H     = 24;   // sparkline canvas height px
    const HISTORY_MAX = 40;   // readings to keep per job (~2 min at 3s interval)

    // Derive the API base from the page URL so the UI works behind reverse
    // proxies (e.g. /proxy/192.168.1.101:8000/ui/).
    // Strip the trailing /ui path segment to get the dispatcher root.
    const _API_BASE = (function () {
      const p = window.location.pathname.replace(/\/ui\/?.*$/, "");
      return window.location.origin + p;
    })();

    // ── tabs ──────────────────────────────────────────────────────────────────
    // Switch between Monitor and Launch panels.
    document.getElementById("tabs").addEventListener("click", e => {
      const btn = e.target.closest(".tab-btn");
      if (!btn) return;
      document.querySelectorAll(".tab-btn").forEach(b => {
        b.style.borderBottomColor = b === btn ? "#58a6ff" : "transparent";
        b.style.color = b === btn ? "#58a6ff" : "#8b949e";
      });
      document.getElementById("panel-monitor").style.display = btn.dataset.tab === "monitor" ? "" : "none";
      document.getElementById("panel-launch").style.display  = btn.dataset.tab === "launch" ? "" : "none";
       document.getElementById("panel-templates").style.display = btn.dataset.tab === "templates" ? "" : "none";
       document.getElementById("panel-schedules").style.display = btn.dataset.tab === "schedules" ? "" : "none";
       if (btn.dataset.tab === "templates") refreshTemplates();
       if (btn.dataset.tab === "schedules") refreshSchedules();
     });

    // ── templates ─────────────────────────────────────────────────────────────
    let templatesCache = [];

    function refreshTemplates() {
      fetch(`${_API_BASE}/api/templates`, { headers: authHeaders() })
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(list => {
          templatesCache = list;
          renderTemplateList();
          const sel = document.getElementById("template-select");
          if (!sel) return;
          const current = sel.value;
          sel.innerHTML = '<option value="">— none —</option>';
          for (const t of list) {
            const opt = document.createElement("option");
            opt.value = t.id;
            opt.textContent = t.name || t.id;
            sel.appendChild(opt);
          }
          sel.value = current;
        })
        .catch(() => { templatesCache = []; });
    }
    queueMicrotask(() => { refreshTemplates(); });
    setInterval(refreshTemplates, 30000);

    // ── staging area ──────────────────────────────────────────────────────────
    let stagingCache = [];

    function refreshStaging() {
      fetch(`${_API_BASE}/api/staging`, { headers: authHeaders() })
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(list => {
          stagingCache = list;
          const sel = document.getElementById("staging-select");
          if (!sel) return;
          const current = sel.value;
          sel.innerHTML = '<option value="">— none —</option>';
          for (const s of list) {
            const opt = document.createElement("option");
            opt.value = s.id;
            opt.textContent = s.name || s.id;
            sel.appendChild(opt);
          }
          sel.value = current;
        })
        .catch(() => { /* keep last successful cache so submit still works */ });
    }

    queueMicrotask(() => { refreshStaging(); });
    setInterval(refreshStaging, 30000);

    // ── template CRUD ─────────────────────────────────────────────────────────
    let editingTplId = null;

    function renderTemplateList() {
      const list = document.getElementById("tpl-list");
      if (!list) return;
      list.innerHTML = "";
      for (const t of templatesCache) {
        const row = document.createElement("div");
        row.style.cssText = "display:flex;justify-content:space-between;align-items:center;background:#161b22;border:1px solid #30363d;border-radius:4px;padding:0.5rem 0.8rem;";
        row.innerHTML = `
          <div>
            <span style="color:#e6ed3f;font-size:0.85rem;">${esc(t.name || t.id)}</span>
            <span style="color:#8b949e;font-size:0.75rem;margin-left:0.5rem;">${esc(t.image || "")}</span>
          </div>
          <div style="display:flex;gap:0.4rem;">
            <button class="tpl-edit" data-tpl-id="${esc(t.id)}" style="background:#21262d;border:1px solid #30363d;color:#8b949e;padding:0.25rem 0.6rem;font-family:inherit;font-size:0.75rem;border-radius:4px;cursor:pointer;">Edit</button>
            <button class="tpl-del" data-tpl-id="${esc(t.id)}" style="background:#21262d;border:1px solid #30363d;color:#f85149;padding:0.25rem 0.6rem;font-family:inherit;font-size:0.75rem;border-radius:4px;cursor:pointer;">Delete</button>
          </div>
        `;
        list.appendChild(row);
      }
    }

    function openTplForm(tpl) {
      editingTplId = tpl ? tpl.id : null;
      document.getElementById("tpl-name").value = tpl ? (tpl.name || "") : "";
      document.getElementById("tpl-image").value = tpl ? (tpl.image || "") : "";
      document.getElementById("tpl-cmd").value = tpl ? (Array.isArray(tpl.cmd) ? tpl.cmd.join(" ") : (tpl.cmd || "")) : "";
      document.getElementById("tpl-env").value = tpl && tpl.env ? Object.entries(tpl.env).map(([k, v]) => `${k}=${v}`).join("\n") : "";
      document.getElementById("tpl-volumes").value = tpl && tpl.volumes ? tpl.volumes.map(v => `${v.host_path}:${v.container_path}${v.mode !== "rw" ? ":" + v.mode : ""}`).join("\n") : "";
      document.getElementById("tpl-edit-title").textContent = tpl ? `Edit: ${tpl.name || tpl.id}` : "New Template";
      document.getElementById("tpl-delete-btn").style.display = tpl ? "" : "none";
      document.getElementById("tpl-list").style.display = "none";
      document.getElementById("tpl-new-btn").style.display = "none";
      document.getElementById("tpl-edit-panel").style.display = "";
    }

    function closeTplForm() {
      editingTplId = null;
      document.getElementById("tpl-edit-panel").style.display = "none";
      document.getElementById("tpl-list").style.display = "";
      document.getElementById("tpl-new-btn").style.display = "";
    }

    function renderTplListClick() {
      document.getElementById("tpl-list").addEventListener("click", e => {
        if (e.target.classList.contains("tpl-edit")) {
          const tpl = templatesCache.find(t => t.id === e.target.dataset.tplId);
          if (tpl) openTplForm(tpl);
        } else if (e.target.classList.contains("tpl-del")) {
          const tpl = templatesCache.find(t => t.id === e.target.dataset.tplId);
          if (!tpl) return;
          if (!window.confirm(`Delete template "${tpl.name || tpl.id}"?`)) return;
          fetch(`${_API_BASE}/api/templates/${tpl.id}`, { method: "DELETE", headers: authHeaders() })
            .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
            .then(() => { refreshTemplates(); })
            .catch(err => { alert(`Failed to delete template: ${err.message}`); });
        }
      });
    }

    function saveTplForm() {
      const tplForm = document.getElementById("tpl-form");
      if (!tplForm) return;
      const body = {
        ...(editingTplId ? { id: editingTplId } : {}),
        name: tplForm.querySelector("#tpl-name").value.trim(),
        image: tplForm.querySelector("#tpl-image").value.trim(),
        cmd: (() => {
          const v = tplForm.querySelector("#tpl-cmd").value.trim();
          if (!v) return undefined;
          return v.split(/\s+/).filter(Boolean);
        })(),
        env: (() => {
          const lines = tplForm.querySelector("#tpl-env").value.trim().split("\n");
          const obj = {};
          for (const line of lines) {
            const idx = line.indexOf("=");
            if (idx >= 0) obj[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
          }
          return Object.keys(obj).length > 0 ? obj : undefined;
        })(),
        volumes: (() => {
          const lines = tplForm.querySelector("#tpl-volumes").value.trim().split("\n").filter(l => l.trim());
          const result = [];
          for (const line of lines) {
            const parts = line.split(":");
            if (parts.length > 2) {
              const container = parts.slice(1, -1).join(":");
              result.push({ host_path: parts[0].trim(), container_path: container, mode: parts[parts.length - 1].trim() });
            } else if (parts.length === 2) {
              result.push({ host_path: parts[0].trim(), container_path: parts[1].trim(), mode: "rw" });
            }
          }
          return result.length > 0 ? result : undefined;
        })(),
      };
      fetch(`${_API_BASE}/api/templates`, {
        method: "POST",
        headers: { ...authHeaders(), "Content-Type": "application/json" },
        body: JSON.stringify(body),
      })
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(() => {
          closeTplForm();
          refreshTemplates();
        })
        .catch(err => { alert(`Failed to save template: ${err.message}`); });
    }

    // Template CRUD event listeners
    renderTplListClick();
    document.getElementById("tpl-new-btn").addEventListener("click", () => openTplForm(null));
    document.getElementById("tpl-cancel-btn").addEventListener("click", closeTplForm);
    document.getElementById("tpl-save-btn").addEventListener("click", saveTplForm);
    document.getElementById("tpl-delete-btn").addEventListener("click", () => {
      if (!editingTplId) return;
      const tpl = templatesCache.find(t => t.id === editingTplId);
      const label = tpl ? (tpl.name || tpl.id) : editingTplId;
      if (!window.confirm(`Delete template "${label}"?`)) return;
      fetch(`${_API_BASE}/api/templates/${editingTplId}`, { method: "DELETE", headers: authHeaders() })
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(() => { closeTplForm(); refreshTemplates(); })
        .catch(err => { alert(`Failed to delete template: ${err.message}`); });
    });

    // ── launch form ────────────────────────────────────────────────────────────
    // Parse multi-line string input into key=value pairs.
    function parseLines(text) {
      return text.trim().split("\n").filter(l => l.trim()).map(l => l.trim());
    }

    function parseEnv(text) {
      const obj = {};
      for (const line of parseLines(text)) {
        const idx = line.indexOf("=");
        if (idx >= 0) obj[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
      }
      return Object.keys(obj).length > 0 ? obj : undefined;
    }

    function parseVolumes(text) {
      const result = [];
      for (const line of parseLines(text)) {
        const parts = line.split(":");
        if (parts.length < 2) continue;  // at least host:container
        const entry = { host_path: parts[0].trim(), container_path: parts[1].trim() };
        entry.mode = parts[2] ? parts[2].trim() : "rw";
        result.push(entry);
      }
      return result.length > 0 ? result : undefined;
    }

    function parseGpu(text) {
      if (!text) return undefined;
      if (text === "all") return { device_ids: "all", capabilities: ["gpu"] };
      return { device_ids: text.split(",").map(s => s.trim()), capabilities: ["gpu"] };
    }

    document.getElementById("launch-form").addEventListener("submit", async e => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const resultDiv = document.getElementById("launch-result");
      const resultHeader = document.getElementById("result-header");
      const resultBody = document.getElementById("result-body");

      btn.disabled = true;
      btn.textContent = "Submitting…";
      resultDiv.style.display = "none";

      const image = document.getElementById("job-image").value.trim();
      const cmd = document.getElementById("job-cmd").value.trim();
      let payload = {
        image,
        cmd: cmd || undefined,
        env: parseEnv(document.getElementById("job-env").value),
        volumes: parseVolumes(document.getElementById("job-volumes").value),
        gpu: parseGpu(document.getElementById("job-gpu").value),
        shm_size: document.getElementById("job-shm").value.trim() || undefined,
        ipc_mode: document.getElementById("job-ipc").value.trim() || undefined,
        detach: document.getElementById("job-detach").value === "1",
      };

      const tplSelect = document.getElementById("template-select");
      if (tplSelect) {
        const templateId = tplSelect.value;
        if (templateId) {
          const tpl = templatesCache.find(t => t.id === templateId);
          if (tpl) {
            if (!payload.image && tpl.image) payload.image = tpl.image;
            if (!payload.cmd && tpl.cmd) payload.cmd = tpl.cmd;
            if (!payload.env && tpl.env && Object.keys(tpl.env).length > 0) {
              payload.env = {};
              for (const [k, v] of Object.entries(tpl.env)) {
                payload.env[k] = v;
              }
            }
            if (!payload.volumes && tpl.volumes && tpl.volumes.length > 0) {
              payload.volumes = tpl.volumes.map(m => ({
                host_path: m.host_path,
                container_path: m.container_path,
                mode: m.mode || "rw",
              }));
            }
          }
        }
      }

      const stgSelect = document.getElementById("staging-select");
      if (stgSelect) {
        const stagingId = stgSelect.value;
        if (stagingId) {
          const st = stagingCache.find(s => s.id === stagingId);
          if (st && st.host_path) {
            const mount = {
              host_path: st.host_path,
              container_path: st.dest_path || st.host_path,
              mode: "rw",
            };
            if (!payload.volumes) {
              payload.volumes = [mount];
            } else {
              payload.volumes.push(mount);
            }
          }
        }
      }

      // Enforce image requirement after template/staging merge so:
      // - template-only launches work (image set by template merge)
      // - unselected templates with empty images are rejected
      if (!payload.image) {
        resultHeader.textContent = "Validation Error";
        resultBody.textContent = "Image is required. Either enter it manually or select a template that includes one.";
        resultBody.style.color = "#f85149";
        resultDiv.style.display = "";
        btn.disabled = false;
        btn.textContent = "Submit Job";
        return;
      }
      }

      try {
        const resp = await fetch(`${_API_BASE}/v1/execute`, {
          method: "POST",
          headers: { ...authHeaders(), "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail ?? err.message ?? `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        resultHeader.textContent = data.status === "running"
          ? `Job submitted — container ${data.container_id}`
          : `Job completed (exit ${data.exit_code})`;
        resultBody.textContent = JSON.stringify(data, null, 2);
        resultDiv.style.display = "";

        // Switch detached submissions to monitor so the user can see the running job.
        if (data.status === "running") {
          document.querySelector('[data-tab="monitor"]').click();
        }
      } catch (err) {
        resultHeader.textContent = "Error";
        resultBody.textContent = err.message;
        resultBody.style.color = "#f85149";
        resultDiv.style.display = "";
      } finally {
        btn.disabled = false;
        btn.textContent = "Submit Job";
        if (resultHeader.textContent !== "Error") {
          resultBody.style.color = "#8b949e";
        }
      }
    });

    // ── api key ───────────────────────────────────────────────────────────────
    // Key is stored in sessionStorage so it is never embedded in the HTML source.
    // On first load the user is prompted once; leave blank for open deployments.
    const _KEY_STORE    = "caas-ui-api-key";
    const _KEY_PROMPTED = "caas-ui-api-key-prompted";

    function getApiKey() {
      const stored = sessionStorage.getItem(_KEY_STORE);
      if (stored !== null) return stored;
      if (sessionStorage.getItem(_KEY_PROMPTED) === "true") return "";
      const entered = window.prompt(
        "Enter X-API-Key (leave blank for unauthenticated access):", ""
      ) ?? "";
      sessionStorage.setItem(_KEY_PROMPTED, "true");
      if (entered) sessionStorage.setItem(_KEY_STORE, entered);
      return entered;
    }

    // ── helpers ───────────────────────────────────────────────────────────────
    function authHeaders() {
      const h = { "Accept": "application/json" };
      const key = getApiKey();
      if (key) h["X-API-Key"] = key;
      return h;
    }

    // Escape a value for safe insertion into HTML text / attribute contexts.
    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function relativeTime(iso) {
      if (!iso) return "—";
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff <  60)   return `${diff}s ago`;
      if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
      return `${Math.floor(diff / 3600)}h ago`;
    }

    // Elapsed duration since submitted_at as a compact string.
    // For stopped jobs, duration is frozen at stop time (we don't have a
    // stopped_at field yet, so we use the last known elapsed from history).
    // Returns "—" for missing, epoch (dispatcher hydrate sentinel), or
    // implausibly large timestamps (> 30 days) to avoid multi-year displays.
    const _EPOCH_MS      = new Date("1970-01-01T00:00:00Z").getTime();
    const _MAX_ELAPSED_S = 30 * 24 * 3600; // 30 days — anything older is "unknown"

    function duration(iso, jobId) {
      if (!iso) return "—";
      const h = _history[jobId];
      // For stopped jobs use the frozen elapsed stored when we saw the stop.
      if (h && h.stoppedElapsed != null) {
        const se = h.stoppedElapsed;
        if (!Number.isFinite(se) || se < 0 || se > _MAX_ELAPSED_S) return "—";
        return fmtElapsed(se);
      }
      const ts = new Date(iso).getTime();
      // Treat epoch (dispatcher hydrate sentinel) or unparseable dates as unknown.
      if (!isFinite(ts) || ts <= _EPOCH_MS) return "—";
      const secs = Math.floor((Date.now() - ts) / 1000);
      if (secs < 0 || secs > _MAX_ELAPSED_S) return "—";
      return fmtElapsed(secs);
    }

    function fmtElapsed(secs) {
      if (secs <  60)   return `${secs}s`;
      if (secs < 3600)  return `${Math.floor(secs / 60)}m ${secs % 60}s`;
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      return `${h}h ${m}m`;
    }

    function badge(status) {
      const cls = { running: "badge-running", stopped: "badge-stopped",
                    failed:  "badge-failed"  }[status] ?? "badge-unknown";
      return `<span class="badge ${cls}">${esc(status ?? "unknown")}</span>`;
    }

    function exitCell(code) {
      if (code === null || code === undefined)
        return `<span class="exit-null">—</span>`;
      return code === 0
        ? `<span class="exit-ok">0</span>`
        : `<span class="exit-fail">${code}</span>`;
    }

    // ── resource history ──────────────────────────────────────────────────────
    // _history[job_id] = { cpu: [...], mem: [...], peakMem: float|null, stoppedElapsed: int|null }
    const _history = {};

    function ensureHistory(jobId) {
      if (!_history[jobId])
        _history[jobId] = { cpu: [], mem: [], peakMem: null, stoppedElapsed: null };
      return _history[jobId];
    }

    function recordHistory(job) {
      const h = ensureHistory(job.job_id);
      const res = job.resources;
      if (res && job.status === "running") {
        h.cpu.push(res.cpu_percent);
        h.mem.push(res.mem_usage_mib);
        if (h.cpu.length > HISTORY_MAX) h.cpu.shift();
        if (h.mem.length > HISTORY_MAX) h.mem.shift();
        if (h.peakMem === null || res.mem_usage_mib > h.peakMem)
          h.peakMem = res.mem_usage_mib;
      }
      // Freeze elapsed time the moment we first see a stopped job.
      // Validate the timestamp first — epoch sentinel or malformed dates
      // must not store NaN/huge values that would survive for the session.
      if (job.status !== "running" && h.stoppedElapsed === null && job.submitted_at) {
        const ts = new Date(job.submitted_at).getTime();
        if (isFinite(ts) && ts > _EPOCH_MS) {
          const secs = Math.floor((Date.now() - ts) / 1000);
          if (secs >= 0 && secs <= _MAX_ELAPSED_S) h.stoppedElapsed = secs;
        }
      }
    }

    // ── sparkline ─────────────────────────────────────────────────────────────
    // Draws a small canvas line chart in-place on a <canvas> element.
    // color: CSS hex string. values: number[]. max: scale ceiling (0 = auto).
    function drawSparkline(canvas, values, color, maxVal) {
      const ctx  = canvas.getContext("2d");
      const w    = canvas.width;
      const h    = canvas.height;
      ctx.clearRect(0, 0, w, h);
      if (!values || values.length < 2) return;

      const lo   = 0;
      const hi   = maxVal > 0 ? maxVal : (Math.max(...values) || 1);
      const step = w / (values.length - 1);

      // Faint fill under the line.
      ctx.beginPath();
      ctx.moveTo(0, h - ((values[0] - lo) / (hi - lo)) * h);
      for (let i = 1; i < values.length; i++) {
        ctx.lineTo(i * step, h - ((values[i] - lo) / (hi - lo)) * h);
      }
      ctx.lineTo((values.length - 1) * step, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      ctx.fillStyle = color + "28"; // ~16% opacity fill
      ctx.fill();

      // Main line.
      ctx.beginPath();
      ctx.moveTo(0, h - ((values[0] - lo) / (hi - lo)) * h);
      for (let i = 1; i < values.length; i++) {
        ctx.lineTo(i * step, h - ((values[i] - lo) / (hi - lo)) * h);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = "round";
      ctx.stroke();

      // Dot at current value.
      const lastX = (values.length - 1) * step;
      const lastY = h - ((values[values.length - 1] - lo) / (hi - lo)) * h;
      ctx.beginPath();
      ctx.arc(lastX, lastY, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    // Render a spark cell HTML string (canvas + label).
    // After inserting into the DOM, call paintAllSparklines() to actually draw.
    // status: "running" | "stopped" | other — used to prefer peakMem for stopped jobs.
    function sparkCellHtml(jobId, kind, status) {
      const h   = _history[jobId];
      const arr = h ? h[kind] : [];
      const cur = arr.length ? arr[arr.length - 1] : null;
      const stopped = status !== "running";

      let label;
      if (kind === "cpu") {
        label = cur !== null ? cur.toFixed(1) + "%" : "—";
      } else {
        // mem — prefer peak for stopped jobs so the high-water mark is always shown.
        const peak = h?.peakMem ?? null;
        if (stopped && peak != null) {
          label = peak.toFixed(0) + " MiB";
        } else if (cur !== null) {
          label = cur.toFixed(0) + " MiB";
        } else if (peak != null) {
          label = peak.toFixed(0) + " MiB";
        } else {
          label = "—";
        }
      }

      const nullCls = cur === null && h?.peakMem == null ? " null" : "";

      return `<div class="spark-cell">
        <canvas width="${SPARK_W}" height="${SPARK_H}"
                data-spark-job="${esc(jobId)}" data-spark-kind="${kind}"></canvas>
        <span class="spark-label${nullCls}">${esc(label)}</span>
      </div>`;
    }

    // Walk all spark canvases in the DOM and redraw them.
    function paintAllSparklines() {
      document.querySelectorAll("canvas[data-spark-job]").forEach(canvas => {
        const jobId = canvas.dataset.sparkJob;
        const kind  = canvas.dataset.sparkKind;
        const h     = _history[jobId];
        if (!h) return;
        const arr   = h[kind];
        const color = kind === "cpu" ? "#d2a8ff" : "#79c0ff";
        // For memory, scale to the peak so the chart doesn't reset when usage
        // drops at the end.
        const maxVal = kind === "mem" && h.peakMem != null ? h.peakMem * 1.05 : 0;
        drawSparkline(canvas, arr, color, maxVal);
      });
    }

    // ── logs panel ────────────────────────────────────────────────────────────
    // Toggled by clicking a job row.
    // For docker_backed jobs: fetches GET /v1/logs/{container_id}.
    // For cell jobs (docker_backed=false): shows stored logs from job record.
    const _openLogs = new Set(); // job IDs currently expanded

    // Cache of fetched log text keyed by job_id.
    // Stopped jobs: cached forever (logs are immutable once the container exits).
    // Running jobs: cache is invalidated at most once per LOG_REFRESH_INTERVAL ms
    //   so open panels stay reasonably fresh without re-fetching every poll.
    // Value is either the resolved log string, or an in-flight Promise that
    // resolves to that string while a fetch is pending.
    const _logCache = {};
    const LOG_REFRESH_INTERVAL = 15_000; // ms between log refreshes for running jobs
    // _logLastFetch[job_id] = timestamp of the last fetch start for running jobs.
    const _logLastFetch = {};

    async function fetchLogs(job) {
      if (!job.docker_backed) {
        // Cell job — logs were returned inline in execute_cell response and
        // are not stored on the server; show a placeholder.
        return "(Cell job logs are returned inline in the notebook — not stored server-side.)";
      }
      try {
        const resp = await fetch(
          `${_API_BASE}/v1/logs/${job.container_id}`,
          { headers: authHeaders() }
        );
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail ?? `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        return data.logs ?? "(no output)";
      } catch (e) {
        throw e;
      }
    }

    // Populate a log panel <pre> for jobId.
    // Uses cache if available; otherwise fetches and populates the cache.
    // The Promise itself is stored in _logCache while the fetch is in flight so
    // concurrent callers (e.g. restoreLogRows() racing with toggleLogs()) await
    // the same request rather than issuing a second one.

    // Auto-scroll to the bottom of a log <pre> only when the user is already
    // near the bottom (within 80px), so manual scrolling up is not disrupted
    // on poll-driven refreshes. firstOpen=true bypasses the check on initial load.
    function maybeScrollToBottom(pre, firstOpen = false) {
      if (!pre) return;
      const nearBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 80;
      if (firstOpen || nearBottom) pre.scrollTop = pre.scrollHeight;
    }

    async function populateLogPanel(logRow, job, firstOpen = false) {
      const cached = _logCache[job.job_id];

      // Already resolved — fill immediately.
      if (typeof cached === "string") {
        const pre = logRow.querySelector("pre");
        if (pre) { pre.className = ""; pre.textContent = cached; maybeScrollToBottom(pre, firstOpen); }
        return;
      }

      // In-flight — wait for the existing promise instead of starting a new fetch.
      if (cached instanceof Promise) {
        try {
          const text = await cached;
          const pre = logRow.querySelector("pre");
          if (pre) { pre.className = ""; pre.textContent = text; maybeScrollToBottom(pre, firstOpen); }
        } catch (e) {
          const pre = logRow.querySelector("pre");
          if (pre) { pre.className = "log-error"; pre.textContent = `Error loading logs: ${e.message}`; }
        }
        return;
      }

      // Nothing cached — start a fetch and store the Promise immediately.
      // Stamp the fetch start time so restoreLogRows() can throttle refreshes.
      _logLastFetch[job.job_id] = Date.now();
      const promise = fetchLogs(job).then(text => {
        _logCache[job.job_id] = text;
        return text;
      }).catch(e => {
        // Don't cache errors — allow retry on next toggle.
        delete _logCache[job.job_id];
        throw e;
      });
      _logCache[job.job_id] = promise;

      try {
        const text = await promise;
        const pre = logRow.querySelector("pre");
        if (pre) { pre.className = ""; pre.textContent = text; maybeScrollToBottom(pre, firstOpen); }
      } catch (e) {
        const pre = logRow.querySelector("pre");
        if (pre) { pre.className = "log-error"; pre.textContent = `Error loading logs: ${e.message}`; }
      }
    }

    // Insert or remove the log expansion row immediately after a job row.
    async function toggleLogs(jobId, job) {
      const jobRow = document.querySelector(`tr.job-row[data-job-id="${CSS.escape(jobId)}"]`);
      if (!jobRow) return;

      if (_openLogs.has(jobId)) {
        // Collapse
        _openLogs.delete(jobId);
        jobRow.setAttribute("aria-expanded", "false");
        const existing = document.getElementById(`log-row-${jobId}`);
        if (existing) existing.remove();
        return;
      }

      // Expand
      _openLogs.add(jobId);
      jobRow.setAttribute("aria-expanded", "true");
      const logRow = document.createElement("tr");
      logRow.className = "log-row";
      logRow.id = `log-row-${jobId}`;
      logRow.innerHTML = `<td colspan="10"><div class="log-panel">
        <pre class="log-loading">Loading logs…</pre>
      </div></td>`;
      jobRow.insertAdjacentElement("afterend", logRow);
      await populateLogPanel(logRow, job, /* firstOpen */ true);
    }

    // Re-insert open log rows after the table is re-rendered by poll().
    // Uses the cache — no extra HTTP requests unless the job is still running
    // and LOG_REFRESH_INTERVAL ms have elapsed since the last fetch.
    function restoreLogRows() {
      for (const jobId of _openLogs) {
        if (document.getElementById(`log-row-${jobId}`)) continue;
        const jobRow = document.querySelector(`tr.job-row[data-job-id="${CSS.escape(jobId)}"]`);
        if (!jobRow) continue;

        const logRow = document.createElement("tr");
        logRow.className = "log-row";
        logRow.id = `log-row-${jobId}`;
        logRow.innerHTML = `<td colspan="10"><div class="log-panel">
          <pre class="log-loading">Loading logs…</pre>
        </div></td>`;
        jobRow.insertAdjacentElement("afterend", logRow);
        jobRow.setAttribute("aria-expanded", "true");

        const job = _jobMap[jobId] ?? { job_id: jobId, docker_backed: true };
        // For running jobs, only invalidate the cache if enough time has passed
        // since the last fetch started (tracked by populateLogPanel).
        if (job.status === "running") {
          const last = _logLastFetch[jobId] ?? 0;
          if (Date.now() - last >= LOG_REFRESH_INTERVAL) {
            delete _logCache[jobId];
            // _logLastFetch will be updated by populateLogPanel when it starts.
          }
        }
        populateLogPanel(logRow, job);
      }
    }

    // ── render ────────────────────────────────────────────────────────────────
    // To add more actions, add a <button> and wire it in handleAction().
    function renderRow(job) {
      const shortId = esc((job.job_id ?? "?").slice(0, 12));
      const fullId  = esc(job.job_id ?? "?");
      // cmd can be a string, an array, or null (API schema: Union[str, List[str], None])
      const cmdStr  = Array.isArray(job.cmd)
        ? job.cmd.join(" ")
        : (typeof job.cmd === "string" ? job.cmd : "");
      const cmd     = esc(cmdStr);
      const image   = esc(job.image ?? "?");
      const running = job.status === "running";

      return `
        <tr class="job-row" data-job-id="${fullId}"
            tabindex="0" role="button" aria-expanded="false"
            title="Click to toggle logs">
          <td class="job-id" title="${fullId}">${shortId}</td>
          <td class="image">${image}</td>
          <td class="cmd" title="${cmd}">${cmd}</td>
          <td>${badge(job.status)}</td>
          <td>${relativeTime(job.submitted_at)}</td>
          <td class="duration" data-job-id="${fullId}" data-submitted="${esc(job.submitted_at ?? "")}">${duration(job.submitted_at, job.job_id)}</td>
          <td>${sparkCellHtml(job.job_id, "cpu", job.status)}</td>
          <td>${sparkCellHtml(job.job_id, "mem", job.status)}</td>
          <td>${exitCell(job.exit_code)}</td>
          <td class="actions">
            <button data-action="stop" data-id="${fullId}"
                    title="${running && job.docker_backed ? 'Stop job' : job.docker_backed ? 'Job already stopped' : 'Cell jobs run to completion and cannot be stopped'}"
                    ${running && job.docker_backed ? "" : "disabled"}>
              stop
            </button>
          </td>
        </tr>`;
    }

    // ── actions ───────────────────────────────────────────────────────────────
    async function handleAction(action, jobId) {
      if (action === "stop") {
        if (!confirm(`Stop job ${jobId.slice(0, 12)}?`)) return;
        try {
          const resp = await fetch(`${_API_BASE}/v1/jobs/${jobId}`, {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            alert(`Failed to stop job: ${err.detail ?? resp.status}`);
          }
        } catch (e) {
          alert(`Error: ${e.message}`);
        }
        // Request an immediate refresh.
        _refreshRequested = true;
        if (!_inFlight && _pollTimer !== null) {
          clearTimeout(_pollTimer);
          scheduledPoll();
        }
      }
    }

    // _jobMap: last fetched jobs keyed by job_id, used for log fetches.
    let _jobMap = {};

    document.getElementById("job-body").addEventListener("click", e => {
      // Stop button — don't also trigger row expand.
      const btn = e.target.closest("button[data-action]");
      if (btn) {
        if (!btn.disabled) handleAction(btn.dataset.action, btn.dataset.id);
        return;
      }
      // Row click — toggle logs.
      const row = e.target.closest("tr.job-row");
      if (row) {
        const jobId = row.dataset.jobId;
        toggleLogs(jobId, _jobMap[jobId] ?? { job_id: jobId, docker_backed: true });
      }
    });

    // Keyboard support: Enter or Space on a focused row toggles the log panel.
    // Guard against focus being on the Stop button so native button activation
    // (Enter/Space on <button>) is not intercepted.
    document.getElementById("job-body").addEventListener("keydown", e => {
      if (e.key !== "Enter" && e.key !== " ") return;
      if (e.target.closest("button[data-action]")) return;
      const row = e.target.closest("tr.job-row");
      if (!row) return;
      e.preventDefault();
      const jobId = row.dataset.jobId;
      toggleLogs(jobId, _jobMap[jobId] ?? { job_id: jobId, docker_backed: true });
    });

    // ── duration ticker ───────────────────────────────────────────────────────
    // Updates duration cells every second without a full re-render.
    setInterval(() => {
      document.querySelectorAll("td.duration[data-job-id]").forEach(td => {
        const jobId    = td.dataset.jobId;
        const submitted = td.dataset.submitted;
        td.textContent = duration(submitted, jobId);
      });
    }, 1000);

    // ── poll ──────────────────────────────────────────────────────────────────
    async function poll() {
      try {
        const resp = await fetch(`${_API_BASE}/v1/jobs`, { headers: authHeaders() });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const jobs = await resp.json();

        // Accumulate history before rendering.
        jobs.forEach(recordHistory);
        _jobMap = Object.fromEntries(jobs.map(j => [j.job_id, j]));

        // Prune client-side state for jobs no longer returned by the server
        // to avoid unbounded memory growth in long-running sessions.
        const liveIds = new Set(jobs.map(j => j.job_id));
        for (const id of Object.keys(_history))     { if (!liveIds.has(id)) delete _history[id]; }
        for (const id of Object.keys(_logCache))    { if (!liveIds.has(id)) delete _logCache[id]; }
        for (const id of Object.keys(_logLastFetch)){ if (!liveIds.has(id)) delete _logLastFetch[id]; }
        for (const id of _openLogs)                 { if (!liveIds.has(id)) _openLogs.delete(id); }

        const body = document.getElementById("job-body");
        if (!jobs.length) {
          body.innerHTML = `<tr id="empty"><td colspan="10">No jobs yet.</td></tr>`;
        } else {
          // running jobs first, then most-recently submitted
          jobs.sort((a, b) => {
            if (a.status === "running" && b.status !== "running") return -1;
            if (b.status === "running" && a.status !== "running") return  1;
            return new Date(b.submitted_at) - new Date(a.submitted_at);
          });
          body.innerHTML = jobs.map(renderRow).join("");

          // Re-insert open log panels without re-fetching (uses cache).
          restoreLogRows();
        }

        // Draw sparklines after the DOM is updated.
        paintAllSparklines();

        const el = document.getElementById("status");
        el.textContent = `updated ${new Date().toLocaleTimeString()} · ${jobs.length} job${jobs.length !== 1 ? "s" : ""}`;
        el.className = "";
      } catch (err) {
        const el = document.getElementById("status");
        el.textContent = `error: ${err.message}`;
        el.className = "error";
      }
    }

    // Single-in-flight scheduler.
    // _inFlight: true while a poll() promise is pending.
    // _refreshRequested: set by handleAction to trigger an extra poll
    //   immediately after the current one finishes rather than waiting
    //   for the normal interval.
    let _pollTimer        = null;
    let _inFlight         = false;
    let _refreshRequested = false;

    async function scheduledPoll() {
      _inFlight = true;
      _refreshRequested = false;
      try {
        await poll();
      } finally {
        _inFlight = false;
      }
      // If an action requested a refresh while we were in flight, fire
      // immediately; otherwise wait for the normal interval.
      const delay = _refreshRequested ? 0 : INTERVAL;
      _pollTimer = setTimeout(scheduledPoll, delay);
    }
    scheduledPoll();

    // ── scheduling ────────────────────────────────────────────────────────────
    let schedulesCache = [];
    let schFormOpen = false;

    function refreshSchedules() {
      fetch(`${_API_BASE}/api/schedule`, { headers: authHeaders() })
        .then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(`${_API_BASE}/api/schedule: ${r.status} ${t}`) });
          return r.json();
        })
        .then(res => {
          schedulesCache = res;
          renderScheduleList();
          if (!schFormOpen) {
            document.getElementById("sch-list").style.display = "flex";
            document.getElementById("sch-edit-panel").style.display = "none";
            document.getElementById("sch-new-btn").style.display = "";
          }
        })
        .catch(e => console.error("refreshSchedules", e));
    }

    function renderScheduleList() {
      let count = 0;
      const listEl = document.getElementById("sch-list");
      listEl.innerHTML = schedulesCache.map(sch => {
        count++;
        const status = sch.status || "pending";
        const statusColors = { pending: "#d29922", active: "#3fb950", running: "#3fb950", cancelled: "#6e7681", completed: "#8b949e", error: "#f85149" };
        const badgeColor = statusColors[status] || "#58a6ff";
        const job = sch.jobs && sch.jobs[0];
        const jobId = job ? (typeof job === "string" ? job : job.job_id || "—") : "—"
        const delay = sch.delay_seconds != null && (sch.delay_seconds > 0 ? sch.delay_seconds + "s" : sch.delay_seconds === 0 ? "immediate" : "—");
        const trId = esc(sch.id);
        const tplName = sch._template_name ? ` [${esc(sch._template_name)}]` : "";
        const name = esc(sch.name || `Schedule ${trId}`);
        return `<div id="sch-${trId}" style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0;border-bottom:1px solid #21262d;">
          <code style="color:#8b949e;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:80px;">${name}${tplName}</code>
          <span style="background:${badgeColor};color:#fff;font-size:0.75rem;padding:2px 6px;border-radius:4px;flex-shrink:0;">${status}</span>
          <span style="color:#8b949e;font-size:0.8rem;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">delay: ${delay}</span>
          <span style="color:#8b949e;font-size:0.8rem;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">job: ${esc(jobId)}</span>
          <button onclick="cancelSch('${trId}')" style="background:#da3633;color:#fff;border:none;padding:0.3rem 0.6rem;font-size:0.8rem;border-radius:4px;cursor:pointer;margin-left:auto;flex-shrink:0;">Cancel</button>
        </div>`;
      }).join("");
      if (count === 0) listEl.innerHTML = '<div style="color:#8b949e;padding:1rem;text-align:center;">No schedules found. Create one with + Schedule Job.</div>';
    }

    const _popSchTplsDone = (() => {
      const schSel = document.getElementById("sch-template");
      if (!schSel) return () => {};
      return () => {
        if (templatesCache.length === 0) return;
        const current = schSel.value;
        schSel.innerHTML = '<option value="">— use form fields —</option>';
        templatesCache.forEach(t => {
          const opt = document.createElement("option");
          opt.value = t.id;
          opt.textContent = t.name || t.id;
          schSel.appendChild(opt);
        });
        schSel.value = current || "";
        schSel.removeEventListener("change", schSel._schTplHandler);
        schSel._schTplHandler = function () {
          const tpl = templatesCache.find(t => t.id === schSel.value);
          if (tpl) {
            document.getElementById("sch-delay").value = "0";
            document.getElementById("sch-image").value = tpl.image || "";
            document.getElementById("sch-cmd").value = Array.isArray(tpl.cmd) ? tpl.cmd.join(" ") : tpl.cmd || "";
            if (Array.isArray(tpl.env)) {
              document.getElementById("sch-env").value = tpl.env.map((kv, i) => {
                if (typeof kv === "object" && kv !== null) return `${Object.entries(kv).map(([k, v]) => `${k}=${v}`).join("\n")}`;
                return kv;
              }).join("\n");
            } else if (typeof tpl.env === "object" && tpl.env !== null) {
              document.getElementById("sch-env").value = Object.entries(tpl.env).map(([k, v]) => `${k}=${v}`).join("\n");
            }
            if (Array.isArray(tpl.volumes)) {
              document.getElementById("sch-volumes").value = tpl.volumes.map(v => {
                if (typeof v === "object" && v) return v.host_path + ":" + v.container_path + (v.mode && v.mode !== "rw" ? ":" + v.mode : "");
                return v;
              }).filter(Boolean).join("\n");
            } else if (typeof tpl.volumes === "string") {
              document.getElementById("sch-volumes").value = tpl.volumes.trim();
            }
            document.getElementById("sch-gpu").value = tpl.gpu || "";
          } else {
            document.getElementById("sch-delay").value = "60";
            document.getElementById("sch-image").value = "";
            document.getElementById("sch-cmd").value = "";
            document.getElementById("sch-env").value = "";
            document.getElementById("sch-volumes").value = "";
            document.getElementById("sch-gpu").value = "";
          }
        };
        schSel.dispatchEvent(new Event("change"));
      };
    })();

    function openSchForm() {
      schFormOpen = true;
      document.getElementById("sch-list").style.display = "none";
      document.getElementById("sch-new-btn").style.display = "none";
      document.getElementById("sch-edit-panel").style.display = "block";
      document.getElementById("sch-edit-title").textContent = "Schedule Job";
      document.getElementById("sch-cancel-btn").textContent = "Cancel";
      document.getElementById("sch-save-btn").textContent = "Save Schedule";
      document.getElementById("sch-form").reset();
      document.getElementById("sch-delay").value = "60";
      document.getElementById("sch-template").value = "";
      _popSchTplsDone();
    }

    function closeSchForm() {
      schFormOpen = false;
      document.getElementById("sch-list").style.display = "flex";
      document.getElementById("sch-edit-panel").style.display = "none";
      document.getElementById("sch-new-btn").style.display = "";
      document.getElementById("sch-form").reset();
      document.getElementById("sch-delay").value = "60";
      refreshSchedules();
    }

    function saveSchForm() {
      const delayVal = parseInt(document.getElementById("sch-delay").value, 10);
      const delay = isNaN(delayVal) ? 60 : delayVal;
      let body = { delay_seconds: delay };
      const tplId = document.getElementById("sch-template").value;
      if (tplId) {
        body.template_id = tplId;
      }
      const imgVal = document.getElementById("sch-image").value.trim();
      const cmdVal = document.getElementById("sch-cmd").value.trim();
      if (!tplId || !body.template_id) {
        if (imgVal) body.image = imgVal;
        body.cmd = cmdVal ? cmdVal.split(/\s+/).filter(Boolean) : undefined;
        const envObj = parseEnv(document.getElementById("sch-env").value);
        if (envObj) body.env = envObj;
        const vols = parseVolumes(document.getElementById("sch-volumes").value);
        if (vols) body.volumes = vols;
        const gpu = parseGpu(document.getElementById("sch-gpu").value);
        if (gpu) body.gpu = gpu;
      } else {
        if (imgVal) body.image = imgVal;
        body.cmd = cmdVal ? cmdVal.split(/\s+/).filter(Boolean) : undefined;
        const envVal = document.getElementById("sch-env").value.trim();
        if (envVal) {
          const existing = body.env || {};
          const extra = parseEnv(envVal);
          body.env = { ...existing, ...extra };
        }
        const volVal = document.getElementById("sch-volumes").value.trim();
        if (volVal) {
          const existingVol = body.volumes || [];
          const extraVol = parseVolumes(volVal);
          if (extraVol) body.volumes = [...existingVol, ...extraVol];
        }
        const gpuVal = document.getElementById("sch-gpu").value.trim();
        if (gpuVal) body.gpu = parseGpu(gpuVal);
      }
      fetch(`${_API_BASE}/api/schedule`, {
        method: "POST",
        headers: { ...authHeaders(), "Content-Type": "application/json" },
        body: JSON.stringify(body),
      })
        .then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(`${_API_BASE}/api/schedule: ${r.status} ${t}`) });
          return r.json();
        })
        .then(() => { closeSchForm(); })
        .catch(e => { console.error("schedule POST error:", e); alert("Schedule failed: " + e.message + "\n\nCheck console for details."); });
    }

    function cancelSch(id) {
      if (!confirm("Are you sure you want to cancel this schedule?")) return;
      fetch(`${_API_BASE}/api/schedule/${id}`, { method: "DELETE", headers: authHeaders() })
        .then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(`${_API_BASE}/api/schedule/${id}: ${r.status} ${t}`) });
          refreshSchedules();
        })
        .catch(e => console.error("schedule CANCEL error:", e));
    }

    // Event listeners for scheduling
    document.getElementById("sch-new-btn").addEventListener("click", () => openSchForm());
    document.getElementById("sch-cancel-btn").addEventListener("click", () => closeSchForm());
    document.getElementById("sch-save-btn").addEventListener("click", () => saveSchForm());
  </script>
</body>
</html>
