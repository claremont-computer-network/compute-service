<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaaS — Job Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      background: #0d1117;
      color: #e6edf3;
      padding: 2rem;
      font-size: 14px;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #21262d;
      padding-bottom: 1rem;
    }

    header h1 { font-size: 1.1rem; color: #58a6ff; }

    #status {
      font-size: 0.75rem;
      color: #8b949e;
    }

    #status.error { color: #f85149; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      color: #8b949e;
      font-weight: 500;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
    }

    tbody tr.job-row {
      border-bottom: 1px solid #161b22;
      transition: background 0.1s;
      cursor: pointer;
    }

    tbody tr.job-row:hover { background: #161b22; }

    tbody tr.log-row td {
      padding: 0;
      border-bottom: 1px solid #21262d;
    }

    .log-panel {
      background: #010409;
      border-top: 1px solid #21262d;
      padding: 0.75rem 1rem;
      overflow-x: auto;
    }

    .log-panel pre {
      font-size: 0.8rem;
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }

    .log-panel .log-loading { color: #3d444d; font-style: italic; }
    .log-panel .log-error   { color: #f85149; }

    td {
      padding: 0.5rem 0.75rem;
      vertical-align: middle;
      white-space: nowrap;
    }

    .job-id {
      color: #8b949e;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

    .image { color: #79c0ff; }

    .cmd {
      color: #8b949e;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 2em;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-running { background: #1f4a1f; color: #3fb950; }
    .badge-stopped { background: #1c2a3a; color: #58a6ff; }
    .badge-failed  { background: #3d1c1c; color: #f85149; }
    .badge-unknown { background: #21262d; color: #8b949e; }

    .exit-ok   { color: #3fb950; }
    .exit-fail { color: #f85149; }
    .exit-null { color: #3d444d; }

    .resource      { color: #d2a8ff; }
    .resource-null { color: #3d444d; }
    .duration      { color: #8b949e; font-size: 0.8rem; }

    /* Sparkline canvas cells */
    .spark-cell {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .spark-cell canvas { display: block; }
    .spark-label { color: #d2a8ff; min-width: 52px; text-align: right; }
    .spark-label.null { color: #3d444d; }

    /* Peak badge shown for stopped jobs */
    .peak { font-size: 0.7rem; color: #6e7681; }

    /* Action buttons — wired to DELETE /v1/jobs/{id}, disabled when not running */
    .actions button {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.1s, color 0.1s;
    }

    .actions button:not([disabled]):hover {
      border-color: #f85149;
      color: #f85149;
    }

    .actions button[disabled] {
      opacity: 0.25;
      cursor: default;
    }

    #empty {
      text-align: center;
      padding: 3rem;
      color: #3d444d;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ CaaS Job Monitor</h1>
    <span id="status">connecting…</span>
  </header>

  <table id="job-table">
    <thead>
      <tr>
        <th>Job ID</th>
        <th>Image</th>
        <th>Command</th>
        <th>Status</th>
        <th>Submitted</th>
        <th>Duration</th>
        <th>CPU %</th>
        <th>Memory</th>
        <th>Exit</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="job-body">
      <tr id="empty"><td colspan="10">No jobs yet.</td></tr>
    </tbody>
  </table>

  <script>
    // ── config ────────────────────────────────────────────────────────────────
    const INTERVAL    = 3000; // poll interval in ms
    const SPARK_W     = 60;   // sparkline canvas width px
    const SPARK_H     = 24;   // sparkline canvas height px
    const HISTORY_MAX = 40;   // readings to keep per job (~2 min at 3s interval)

    // Derive the API base from the page URL so the UI works behind reverse
    // proxies (e.g. /proxy/192.168.1.101:8000/ui/).
    // Strip the trailing /ui path segment to get the dispatcher root.
    const _API_BASE = (function () {
      const p = window.location.pathname.replace(/\/ui\/?.*$/, "");
      return window.location.origin + p;
    })();

    // ── api key ───────────────────────────────────────────────────────────────
    // Key is stored in sessionStorage so it is never embedded in the HTML source.
    // On first load the user is prompted once; leave blank for open deployments.
    const _KEY_STORE    = "caas-ui-api-key";
    const _KEY_PROMPTED = "caas-ui-api-key-prompted";

    function getApiKey() {
      const stored = sessionStorage.getItem(_KEY_STORE);
      if (stored !== null) return stored;
      if (sessionStorage.getItem(_KEY_PROMPTED) === "true") return "";
      const entered = window.prompt(
        "Enter X-API-Key (leave blank for unauthenticated access):", ""
      ) ?? "";
      sessionStorage.setItem(_KEY_PROMPTED, "true");
      if (entered) sessionStorage.setItem(_KEY_STORE, entered);
      return entered;
    }

    // ── helpers ───────────────────────────────────────────────────────────────
    function authHeaders() {
      const h = { "Accept": "application/json" };
      const key = getApiKey();
      if (key) h["X-API-Key"] = key;
      return h;
    }

    // Escape a value for safe insertion into HTML text / attribute contexts.
    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function relativeTime(iso) {
      if (!iso) return "—";
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff <  60)   return `${diff}s ago`;
      if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
      return `${Math.floor(diff / 3600)}h ago`;
    }

    // Elapsed duration since submitted_at as a compact string.
    // For stopped jobs, duration is frozen at stop time (we don't have a
    // stopped_at field yet, so we use the last known elapsed from history).
    // Returns "—" for missing, epoch (dispatcher hydrate sentinel), or
    // implausibly large timestamps (> 30 days) to avoid multi-year displays.
    const _EPOCH_MS      = new Date("1970-01-01T00:00:00Z").getTime();
    const _MAX_ELAPSED_S = 30 * 24 * 3600; // 30 days — anything older is "unknown"

    function duration(iso, jobId) {
      if (!iso) return "—";
      const h = _history[jobId];
      // For stopped jobs use the frozen elapsed stored when we saw the stop.
      if (h && h.stoppedElapsed != null) return fmtElapsed(h.stoppedElapsed);
      const ts = new Date(iso).getTime();
      // Treat epoch (dispatcher hydrate sentinel) or unparseable dates as unknown.
      if (!isFinite(ts) || ts <= _EPOCH_MS) return "—";
      const secs = Math.floor((Date.now() - ts) / 1000);
      if (secs < 0 || secs > _MAX_ELAPSED_S) return "—";
      return fmtElapsed(secs);
    }

    function fmtElapsed(secs) {
      if (secs <  60)   return `${secs}s`;
      if (secs < 3600)  return `${Math.floor(secs / 60)}m ${secs % 60}s`;
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      return `${h}h ${m}m`;
    }

    function badge(status) {
      const cls = { running: "badge-running", stopped: "badge-stopped",
                    failed:  "badge-failed"  }[status] ?? "badge-unknown";
      return `<span class="badge ${cls}">${esc(status ?? "unknown")}</span>`;
    }

    function exitCell(code) {
      if (code === null || code === undefined)
        return `<span class="exit-null">—</span>`;
      return code === 0
        ? `<span class="exit-ok">0</span>`
        : `<span class="exit-fail">${code}</span>`;
    }

    // ── resource history ──────────────────────────────────────────────────────
    // _history[job_id] = { cpu: [...], mem: [...], peakMem: float|null, stoppedElapsed: int|null }
    const _history = {};

    function ensureHistory(jobId) {
      if (!_history[jobId])
        _history[jobId] = { cpu: [], mem: [], peakMem: null, stoppedElapsed: null };
      return _history[jobId];
    }

    function recordHistory(job) {
      const h = ensureHistory(job.job_id);
      const res = job.resources;
      if (res && job.status === "running") {
        h.cpu.push(res.cpu_percent);
        h.mem.push(res.mem_usage_mib);
        if (h.cpu.length > HISTORY_MAX) h.cpu.shift();
        if (h.mem.length > HISTORY_MAX) h.mem.shift();
        if (h.peakMem === null || res.mem_usage_mib > h.peakMem)
          h.peakMem = res.mem_usage_mib;
      }
      // Freeze elapsed time the moment we first see a stopped job.
      if (job.status !== "running" && h.stoppedElapsed === null && job.submitted_at) {
        h.stoppedElapsed = Math.floor((Date.now() - new Date(job.submitted_at)) / 1000);
      }
    }

    // ── sparkline ─────────────────────────────────────────────────────────────
    // Draws a small canvas line chart in-place on a <canvas> element.
    // color: CSS hex string. values: number[]. max: scale ceiling (0 = auto).
    function drawSparkline(canvas, values, color, maxVal) {
      const ctx  = canvas.getContext("2d");
      const w    = canvas.width;
      const h    = canvas.height;
      ctx.clearRect(0, 0, w, h);
      if (!values || values.length < 2) return;

      const lo   = 0;
      const hi   = maxVal > 0 ? maxVal : (Math.max(...values) || 1);
      const step = w / (values.length - 1);

      // Faint fill under the line.
      ctx.beginPath();
      ctx.moveTo(0, h - ((values[0] - lo) / (hi - lo)) * h);
      for (let i = 1; i < values.length; i++) {
        ctx.lineTo(i * step, h - ((values[i] - lo) / (hi - lo)) * h);
      }
      ctx.lineTo((values.length - 1) * step, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      ctx.fillStyle = color + "28"; // ~16% opacity fill
      ctx.fill();

      // Main line.
      ctx.beginPath();
      ctx.moveTo(0, h - ((values[0] - lo) / (hi - lo)) * h);
      for (let i = 1; i < values.length; i++) {
        ctx.lineTo(i * step, h - ((values[i] - lo) / (hi - lo)) * h);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = "round";
      ctx.stroke();

      // Dot at current value.
      const lastX = (values.length - 1) * step;
      const lastY = h - ((values[values.length - 1] - lo) / (hi - lo)) * h;
      ctx.beginPath();
      ctx.arc(lastX, lastY, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    // Render a spark cell HTML string (canvas + label).
    // After inserting into the DOM, call paintSparkCanvas() to actually draw.
    function sparkCellHtml(jobId, kind) {
      const h   = _history[jobId];
      const arr = h ? h[kind] : [];
      const cur = arr.length ? arr[arr.length - 1] : null;

      let label, unit;
      if (kind === "cpu") {
        label = cur !== null ? cur.toFixed(1) + "%" : "—";
        unit  = "%";
      } else {
        // mem — also show peak for stopped jobs
        const peak = h && h.peakMem !== null ? h.peakMem : null;
        if (cur !== null) {
          label = cur.toFixed(0) + " MiB";
        } else if (peak !== null) {
          label = peak.toFixed(0) + " MiB";
        } else {
          label = "—";
        }
        unit = "MiB";
      }

      const hasData = arr.length >= 2;
      const nullCls = cur === null && !(h && h.peakMem) ? " null" : "";

      return `<div class="spark-cell">
        <canvas width="${SPARK_W}" height="${SPARK_H}"
                data-spark-job="${esc(jobId)}" data-spark-kind="${kind}"></canvas>
        <span class="spark-label${nullCls}">${esc(label)}</span>
      </div>`;
    }

    // Walk all spark canvases in the DOM and redraw them.
    function paintAllSparklines() {
      document.querySelectorAll("canvas[data-spark-job]").forEach(canvas => {
        const jobId = canvas.dataset.sparkJob;
        const kind  = canvas.dataset.sparkKind;
        const h     = _history[jobId];
        if (!h) return;
        const arr   = h[kind];
        const color = kind === "cpu" ? "#d2a8ff" : "#79c0ff";
        // For memory, scale to the peak so the chart doesn't reset when usage
        // drops at the end.
        const maxVal = kind === "mem" && h.peakMem ? h.peakMem * 1.05 : 0;
        drawSparkline(canvas, arr, color, maxVal);
      });
    }

    // ── logs panel ────────────────────────────────────────────────────────────
    // Toggled by clicking a job row.
    // For docker_backed jobs: fetches GET /v1/logs/{container_id}.
    // For cell jobs (docker_backed=false): shows stored logs from job record.
    const _openLogs = new Set(); // job IDs currently expanded

    // Cache of fetched log text keyed by job_id.
    // Stopped jobs: cached forever (logs are immutable once the container exits).
    // Running jobs: cached until the job stops so repeated polls don't re-fetch.
    // Value is the resolved log string, or null while a fetch is in flight.
    const _logCache = {};

    async function fetchLogs(job) {
      if (!job.docker_backed) {
        // Cell job — logs were returned inline in execute_cell response and
        // are not stored on the server; show a placeholder.
        return "(Cell job logs are returned inline in the notebook — not stored server-side.)";
      }
      try {
        const resp = await fetch(
          `${_API_BASE}/v1/logs/${job.container_id}`,
          { headers: authHeaders() }
        );
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail ?? `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        return data.logs ?? "(no output)";
      } catch (e) {
        throw e;
      }
    }

    // Populate a log panel <pre> for jobId.
    // Uses cache if available; otherwise fetches and populates the cache.
    async function populateLogPanel(logRow, job) {
      const cached = _logCache[job.job_id];
      if (cached !== undefined && cached !== null) {
        const pre = logRow.querySelector("pre");
        if (pre) { pre.className = ""; pre.textContent = cached; pre.scrollTop = pre.scrollHeight; }
        return;
      }
      // Mark in-flight with null so a second concurrent call doesn't double-fetch.
      _logCache[job.job_id] = null;
      try {
        const text = await fetchLogs(job);
        _logCache[job.job_id] = text;
        const pre = logRow.querySelector("pre");
        if (pre) { pre.className = ""; pre.textContent = text; pre.scrollTop = pre.scrollHeight; }
      } catch (e) {
        // Don't cache errors — allow retry on next toggle.
        delete _logCache[job.job_id];
        const pre = logRow.querySelector("pre");
        if (pre) { pre.className = "log-error"; pre.textContent = `Error loading logs: ${e.message}`; }
      }
    }

    // Insert or remove the log expansion row immediately after a job row.
    async function toggleLogs(jobId, job) {
      const jobRow = document.querySelector(`tr.job-row[data-job-id="${CSS.escape(jobId)}"]`);
      if (!jobRow) return;

      if (_openLogs.has(jobId)) {
        // Collapse
        _openLogs.delete(jobId);
        const existing = document.getElementById(`log-row-${CSS.escape(jobId)}`);
        if (existing) existing.remove();
        return;
      }

      // Expand
      _openLogs.add(jobId);
      const logRow = document.createElement("tr");
      logRow.className = "log-row";
      logRow.id = `log-row-${jobId}`;
      logRow.innerHTML = `<td colspan="10"><div class="log-panel">
        <pre class="log-loading">Loading logs…</pre>
      </div></td>`;
      jobRow.insertAdjacentElement("afterend", logRow);
      await populateLogPanel(logRow, job);
    }

    // Re-insert open log rows after the table is re-rendered by poll().
    // Uses the cache — no extra HTTP requests unless the job is still running.
    function restoreLogRows() {
      for (const jobId of _openLogs) {
        if (document.getElementById(`log-row-${jobId}`)) continue;
        const jobRow = document.querySelector(`tr.job-row[data-job-id="${CSS.escape(jobId)}"]`);
        if (!jobRow) continue;

        const logRow = document.createElement("tr");
        logRow.className = "log-row";
        logRow.id = `log-row-${jobId}`;
        logRow.innerHTML = `<td colspan="10"><div class="log-panel">
          <pre class="log-loading">Loading logs…</pre>
        </div></td>`;
        jobRow.insertAdjacentElement("afterend", logRow);

        const job = _jobMap[jobId] ?? { job_id: jobId, docker_backed: true };
        // For running jobs, invalidate the cache on each poll so logs stay fresh.
        if (job.status === "running") delete _logCache[jobId];
        populateLogPanel(logRow, job);
      }
    }

    // ── render ────────────────────────────────────────────────────────────────
    // To add more actions, add a <button> and wire it in handleAction().
    function renderRow(job) {
      const shortId = esc((job.job_id ?? "?").slice(0, 12));
      const fullId  = esc(job.job_id ?? "?");
      // cmd can be a string, an array, or null (API schema: Union[str, List[str], None])
      const cmdStr  = Array.isArray(job.cmd)
        ? job.cmd.join(" ")
        : (typeof job.cmd === "string" ? job.cmd : "");
      const cmd     = esc(cmdStr);
      const image   = esc(job.image ?? "?");
      const running = job.status === "running";

      return `
        <tr class="job-row" data-job-id="${fullId}">
          <td class="job-id" title="${fullId}">${shortId}</td>
          <td class="image">${image}</td>
          <td class="cmd" title="${cmd}">${cmd}</td>
          <td>${badge(job.status)}</td>
          <td>${relativeTime(job.submitted_at)}</td>
          <td class="duration" data-job-id="${fullId}" data-submitted="${esc(job.submitted_at ?? "")}">${duration(job.submitted_at, job.job_id)}</td>
          <td>${sparkCellHtml(job.job_id, "cpu")}</td>
          <td>${sparkCellHtml(job.job_id, "mem")}</td>
          <td>${exitCell(job.exit_code)}</td>
          <td class="actions">
            <button data-action="stop" data-id="${fullId}"
                    title="${running && job.docker_backed ? 'Stop job' : job.docker_backed ? 'Job already stopped' : 'Cell jobs run to completion and cannot be stopped'}"
                    ${running && job.docker_backed ? "" : "disabled"}>
              stop
            </button>
          </td>
        </tr>`;
    }

    // ── actions ───────────────────────────────────────────────────────────────
    async function handleAction(action, jobId, job) {
      if (action === "stop") {
        if (!confirm(`Stop job ${jobId.slice(0, 12)}?`)) return;
        try {
          const resp = await fetch(`${_API_BASE}/v1/jobs/${jobId}`, {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            alert(`Failed to stop job: ${err.detail ?? resp.status}`);
          }
        } catch (e) {
          alert(`Error: ${e.message}`);
        }
        // Request an immediate refresh.
        _refreshRequested = true;
        if (!_inFlight && _pollTimer !== null) {
          clearTimeout(_pollTimer);
          scheduledPoll();
        }
      }
    }

    // _jobMap: last fetched jobs keyed by job_id, used for log fetches.
    let _jobMap = {};

    document.getElementById("job-body").addEventListener("click", e => {
      // Stop button — don't also trigger row expand.
      const btn = e.target.closest("button[data-action]");
      if (btn) {
        if (!btn.disabled) handleAction(btn.dataset.action, btn.dataset.id, _jobMap[btn.dataset.id]);
        return;
      }
      // Row click — toggle logs.
      const row = e.target.closest("tr.job-row");
      if (row) {
        const jobId = row.dataset.jobId;
        toggleLogs(jobId, _jobMap[jobId] ?? { job_id: jobId, docker_backed: true });
      }
    });

    // ── duration ticker ───────────────────────────────────────────────────────
    // Updates duration cells every second without a full re-render.
    setInterval(() => {
      document.querySelectorAll("td.duration[data-job-id]").forEach(td => {
        const jobId    = td.dataset.jobId;
        const submitted = td.dataset.submitted;
        td.textContent = duration(submitted, jobId);
      });
    }, 1000);

    // ── poll ──────────────────────────────────────────────────────────────────
    async function poll() {
      try {
        const resp = await fetch(`${_API_BASE}/v1/jobs`, { headers: authHeaders() });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const jobs = await resp.json();

        // Accumulate history before rendering.
        jobs.forEach(recordHistory);
        _jobMap = Object.fromEntries(jobs.map(j => [j.job_id, j]));

        const body = document.getElementById("job-body");
        if (!jobs.length) {
          body.innerHTML = `<tr id="empty"><td colspan="10">No jobs yet.</td></tr>`;
        } else {
          // running jobs first, then most-recently submitted
          jobs.sort((a, b) => {
            if (a.status === "running" && b.status !== "running") return -1;
            if (b.status === "running" && a.status !== "running") return  1;
            return new Date(b.submitted_at) - new Date(a.submitted_at);
          });
          body.innerHTML = jobs.map(renderRow).join("");

          // Re-insert open log panels without re-fetching (uses cache).
          restoreLogRows();
        }

        // Draw sparklines after the DOM is updated.
        paintAllSparklines();

        const el = document.getElementById("status");
        el.textContent = `updated ${new Date().toLocaleTimeString()} · ${jobs.length} job${jobs.length !== 1 ? "s" : ""}`;
        el.className = "";
      } catch (err) {
        const el = document.getElementById("status");
        el.textContent = `error: ${err.message}`;
        el.className = "error";
      }
    }

    // Single-in-flight scheduler.
    // _inFlight: true while a poll() promise is pending.
    // _refreshRequested: set by handleAction to trigger an extra poll
    //   immediately after the current one finishes rather than waiting
    //   for the normal interval.
    let _pollTimer        = null;
    let _inFlight         = false;
    let _refreshRequested = false;

    async function scheduledPoll() {
      _inFlight = true;
      _refreshRequested = false;
      try {
        await poll();
      } finally {
        _inFlight = false;
      }
      // If an action requested a refresh while we were in flight, fire
      // immediately; otherwise wait for the normal interval.
      const delay = _refreshRequested ? 0 : INTERVAL;
      _pollTimer = setTimeout(scheduledPoll, delay);
    }
    scheduledPoll();
  </script>
